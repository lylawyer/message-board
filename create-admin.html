<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 - 创建管理员</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #856404;
        }
        .warning strong {
            display: block;
            margin-bottom: 5px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #28a745;
            color: #155724;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #dc3545;
            color: #721c24;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
        }
        .info code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>创建管理员账户</h1>

        <div class="warning">
            <strong>⚠️ 安全警告</strong>
            此页面仅限首次部署时使用！创建管理员后，请务必删除此文件。
        </div>

        <button id="createBtn" class="btn" onclick="createAdmin()">
            创建管理员账户
        </button>

        <div id="result" class="result"></div>

        <div class="info">
            <strong>默认管理员凭证：</strong><br>
            用户名：<code>admin_new</code><br>
            密码：<code>aiwoziji</code><br><br>
            <strong>⚠️ 首次登录后请立即修改密码！</strong>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/aipexbase-js@latest"></script>
    <script>
        const client = aipexbase.createClient({
            baseUrl: 'https://baas.kuafuai.net/baas-api',
            apiKey: 'baas_zRu6UoOb'
        });

        async function createAdmin() {
            const btn = document.getElementById('createBtn');
            const result = document.getElementById('result');

            btn.disabled = true;
            btn.textContent = '创建中...';
            result.style.display = 'none';

            try {
                const checkResult = await client.auth.getUser();

                if (checkResult && checkResult.success && checkResult.data) {
                    result.className = 'result success';
                    result.style.display = 'block';
                    result.innerHTML = `
                        <p>✅ 管理员账户已存在！</p>
                        <p>用户名：<code>admin_new</code></p>
                        <p>密码：<code>aiwoziji</code></p>
                        <p style="margin-top: 15px;"><a href="admin.html" style="color: #28a745;">→ 前往管理后台</a></p>
                        <p style="margin-top: 10px; font-size: 12px; color: #856404;">💡 建议：此页面已完成使命，请从仓库中删除。</p>
                    `;
                    btn.style.display = 'none';
                    return;
                }
            } catch (e) {
                console.log('No existing user, proceeding with creation...');
            }

            try {
                const result_reg = await client.auth.register({
                    user_name: 'admin_new',
                    password: 'aiwoziji',
                    nickname: '管理员'
                });

                result.className = 'result success';
                result.style.display = 'block';
                result.innerHTML = `
                    <p>🎉 管理员账户创建成功！</p>
                    <p>用户名：<code>admin_new</code></p>
                    <p>密码：<code>aiwoziji</code></p>
                    <p style="margin-top: 15px;"><a href="admin.html" style="color: #28a745;">→ 前往管理后台</a></p>
                    <p style="margin-top: 10px; font-size: 12px; color: #856404;">💡 重要：请立即删除此文件，防止被恶意利用！</p>
                `;
                btn.style.display = 'none';
            } catch (error) {
                result.className = 'result error';
                result.style.display = 'block';
                result.innerHTML = `
                    <p>❌ 创建失败：${escapeHtml(error.message || '未知错误')}</p>
                    <p style="margin-top: 10px; font-size: 12px;">可能原因：账户已存在或网络错误</p>
                `;
                btn.disabled = false;
                btn.textContent = '重试';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 自动检测是否需要创建
        window.onload = function() {
            createAdmin();
        };
    </script>
</body>
</html>
