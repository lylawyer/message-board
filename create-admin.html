<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建管理员账号</title>
    <script src="https://cdn.jsdelivr.net/npm/aipexbase-js/dist/aipexbase.umd.min.js"></script>
</head>
<body>
    <h1>正在创建管理员账号...</h1>
    <div id="result"></div>
    
    <script>
        const client = aipexbase.createClient({
            baseUrl: 'https://baas.kuafuai.net/baas-api',
            apiKey: 'baas_zRu6UoOb'
        });

        async function createAdmin() {
            try {
                const result = await client.auth.register({
                    user_name: 'admin',
                    password: 'admin123',
                    nickname: '管理员'
                });
                
                document.getElementById('result').innerHTML = `
                    <p style="color: green;">✅ 管理员账号创建成功！</p>
                    <p>用户名: admin</p>
                    <p>密码: admin123</p>
                    <p><a href="admin.html">点击这里登录管理后台</a></p>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <p style="color: red;">❌ 创建失败: ${error.message}</p>
                    <p>可能管理员账号已存在，请直接<a href="admin.html">登录</a></p>
                `;
            }
        }

        createAdmin();
    </script>
</body>
</html>
