<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>留言板 - 管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/utils.js"></script>
    <script>
      tailwind.config = {
          theme: {
              extend: {
                  colors: {
                      primary: {
                          50: '#eff6ff',
                          100: '#dbeafe',
                          200: '#bfdbfe',
                          300: '#93c5fd',
                          400: '#60a5fa',
                          500: '#3b82f6',
                          600: '#2563eb',
                          700: '#1d4ed8',
                          800: '#1e40af',
                          900: '#1e3a8a',
                      },
                  },
                  animation: {
                      'fade-in': 'fadeIn 0.3s ease-out',
                      'slide-up': 'slideUp 0.3s ease-out',
                      'slide-down': 'slideDown 0.3s ease-out',
                  },
                  keyframes: {
                      fadeIn: {
                          '0%': { opacity: '0' },
                          '100%': { opacity: '1' },
                      },
                      slideUp: {
                          '0%': { opacity: '0', transform: 'translateY(20px)' },
                          '100%': { opacity: '1', transform: 'translateY(0)' },
                      },
                      slideDown: {
                          '0%': { opacity: '0', transform: 'translateY(-20px)' },
                          '100%': { opacity: '1', transform: 'translateY(0)' },
                      },
                  },
              }
          }
      }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .transition-smooth { @apply transition-all duration-300 ease-out; }
            .glass { @apply bg-white/80 backdrop-blur-md border border-white/20; }
            .gradient-primary { @apply bg-gradient-to-r from-primary-600 to-primary-500; }
            .gradient-subtle { @apply bg-gradient-to-br from-gray-50 to-gray-100; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/aipexbase-js/dist/aipexbase.umd.min.js"></script>
    <script>
      // 管理页面 - 管理员功能
      var client = null;
      var currentMessageId = null;

      // 初始化 Aipexbase 客户端
      (function() {
          console.log('Script loaded, checking aipexbase...');

          function tryInit() {
              if (typeof aipexbase !== 'undefined') {
                  console.log('aipexbase available, creating client...');
                  client = aipexbase.createClient({
                      baseUrl: 'https://baas.kuafuai.net/baas-api',
                      apiKey: 'baas_zRu6UoOb'
                  });
                  console.log('Client initialized:', client !== null);
                  // 检查用户登录状态
                  if (typeof checkAuth === 'function') {
                      checkAuth();
                  }
              } else {
                  console.log('aipexbase not ready, retrying...');
                  setTimeout(tryInit, 50);
              }
          }

          tryInit();
      })();
  </script>
</head>
<body class="gradient-subtle min-h-screen">
    <!-- 登录页面 -->
    <div id="login-page" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full">
            <div class="bg-white rounded-2xl shadow-xl p-8 animate-fade-in">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 rounded-2xl gradient-primary flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900">留言板</h1>
                    <p class="text-gray-500 mt-2">管理员登录</p>
                </div>

                <form id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                        <input
                            type="text"
                            id="username"
                            required
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-smooth"
                            placeholder="请输入用户名"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                        <input
                            type="password"
                            id="password"
                            required
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-smooth"
                            placeholder="请输入密码"
                        >
                    </div>
                    <button
                        type="submit"
                        class="w-full gradient-primary text-white font-medium py-3 px-6 rounded-xl hover:shadow-lg transition-smooth"
                    >
                        登录
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- 管理员页面 -->
    <div id="admin-page" class="hidden">
        <!-- 顶部导航 -->
        <nav class="sticky top-0 z-50 glass border-b border-gray-200/50">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-xl gradient-primary flex items-center justify-center shadow-lg">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </div>
                        <span class="text-xl font-bold bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent">
                            留言板管理
                        </span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <a href="index.html" class="px-4 py-2 rounded-lg text-gray-600 hover:text-primary-600 hover:bg-primary-50 transition-smooth text-sm font-medium">
                            返回首页
                        </a>
                        <button
                            id="logout-btn"
                            class="px-4 py-2 rounded-lg text-red-600 hover:text-red-700 hover:bg-red-50 transition-smooth text-sm font-medium"
                        >
                            退出登录
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容区域 -->
        <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- 公告编辑区域 -->
            <div class="bg-gradient-to-r from-purple-50 to-pink-50 rounded-xl shadow-md p-6 mb-8 border border-purple-100">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-purple-900 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/>
                        </svg>
                        公告管理
                    </h2>
                    <button
                        id="save-announcement-btn"
                        class="px-4 py-2 rounded-lg bg-gradient-to-r from-purple-500 to-pink-500 text-white hover:shadow-lg transition-smooth text-sm font-medium"
                    >
                        保存公告
                    </button>
                </div>
                <textarea
                    id="announcement-input"
                    rows="3"
                    class="w-full px-4 py-3 rounded-xl border border-purple-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 outline-none transition-smooth resize-none bg-white"
                    placeholder="在此输入公告内容..."
                ></textarea>
            </div>

            <!-- 统计卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow-md p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">总消息数</p>
                            <p id="total-messages" class="text-3xl font-bold text-gray-900 mt-1">0</p>
                        </div>
                        <div class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center">
                            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-md p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">已回复</p>
                            <p id="replied-messages" class="text-3xl font-bold text-green-600 mt-1">0</p>
                        </div>
                        <div class="w-12 h-12 rounded-xl bg-green-100 flex items-center justify-center">
                            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-md p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500">待回复</p>
                            <p id="pending-messages" class="text-3xl font-bold text-orange-600 mt-1">0</p>
                        </div>
                        <div class="w-12 h-12 rounded-xl bg-orange-100 flex items-center justify-center">
                            <svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 消息列表区域 -->
            <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100">
                    <h2 class="text-lg font-semibold text-gray-900">消息列表</h2>
                </div>
                <div id="admin-messages-list" class="divide-y divide-gray-100">
                    <!-- 消息列表将通过 JavaScript 动态生成 -->
                </div>
                <div id="admin-loading" class="text-center py-12 text-gray-400">
                    <svg class="animate-spin w-8 h-8 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
                    </svg>
                    加载中...
                </div>
                <div id="admin-empty-state" class="hidden text-center py-12">
                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                    </svg>
                    <p class="text-gray-400">暂无消息</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 回复模态框 -->
    <div id="reply-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center px-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6 animate-slide-up">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold text-gray-900">回复消息</h3>
                <button id="close-reply-modal" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="original-message" class="mb-4 p-4 bg-gray-50 rounded-lg">
                <!-- 原消息内容将动态插入 -->
            </div>
            <textarea
                id="reply-content"
                rows="4"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-smooth resize-none mb-4"
                placeholder="在此输入回复内容..."
            ></textarea>
            <div class="flex space-x-3">
                <button
                    id="cancel-reply"
                    class="flex-1 px-4 py-2 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-smooth"
                >
                    取消
                </button>
                <button
                    id="submit-reply"
                    class="flex-1 gradient-primary text-white px-4 py-2 rounded-lg hover:shadow-lg transition-smooth"
                >
                    提交回复
                </button>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-3"></div>

    <script>
      // 管理员页面 JavaScript 功能

      // showToast 函数已移至 js/utils.js

      // formatDateTime 函数已移至 js/utils.js

      // escapeHtml 函数已移至 js/utils.js

      // 检查用户认证状态
      async function checkAuth() {
          try {
              const user = await client.auth.getUser();
              console.log('checkAuth getUser:', user);
              if (user && user.success && user.data) {
                  console.log('User is logged in, showing admin page');
                  showAdminPage();
                  loadAdminMessages();
              } else {
                  console.log('User not logged in or getUser failed');
              }
          } catch (error) {
              console.error('checkAuth error:', error);
          }
      }

      // 显示管理员页面
      function showAdminPage() {
          document.getElementById('login-page').classList.add('hidden');
          document.getElementById('admin-page').classList.remove('hidden');
      }

      // 显示登录页面
      function showLoginPage() {
          document.getElementById('login-page').classList.remove('hidden');
          document.getElementById('admin-page').classList.add('hidden');
      }

      // 退出登录事件
      document.getElementById('logout-btn').addEventListener('click', async () => {
          try {
              await client.auth.logout();
              showToast('已安全退出', 'info');
              showLoginPage();
          } catch (error) {
              console.error('logout error:', error);
          }
      });

      // 公告消息ID
      var announcementMsgId = null;

      // 加载公告内容
      async function loadAnnouncement() {
          try {
              const result = await client.db.from('messages').list()
                  .eq('nickname', '系统')
                  .eq('status', 'hidden');

              if (result.success && result.data && result.data.length > 0) {
                  const announcementMsg = result.data.find(m => m.content && m.content.startsWith('[ANNOUNCEMENT]'));
                  if (announcementMsg) {
                      announcementMsgId = announcementMsg.id;
                      const content = announcementMsg.content.replace('[ANNOUNCEMENT] ', '');
                      document.getElementById('announcement-input').value = content === '[默认公告内容]' ? '' : content;
                  }
              }
          } catch (e) {
              console.error('loadAnnouncement error:', e);
          }
      }

      // 保存公告
      async function saveAnnouncement() {
          try {
              const content = document.getElementById('announcement-input').value.trim() || '[默认公告内容]';

              if (announcementMsgId) {
                  // 更新现有公告
                  await client.db.from('messages').update()
                      .set({ content: '[ANNOUNCEMENT] ' + content })
                      .eq('id', announcementMsgId);
              } else {
                  // 创建新公告
                  const result = await client.db.from('messages').insert().values({
                      nickname: '系统',
                      content: '[ANNOUNCEMENT] ' + content,
                      status: 'hidden',
                      created_at: new Date().toISOString()
                  });
                  if (result.success) {
                      announcementMsgId = result.data;
                  }
              }

              showToast('公告保存成功！', 'success');
          } catch (e) {
              console.error('saveAnnouncement error:', e);
              showToast('公告保存失败', 'error');
          }
      }

      // 保存公告按钮事件监听
      document.getElementById('save-announcement-btn').addEventListener('click', saveAnnouncement);

      // 已锁定消息ID列表管理
      let pinnedMessageIds = [];

      // 已私密消息ID列表
      let privateMessageIds = [];

      // 加载已锁定配置
      async function loadPinnedConfig() {
          try {
              const result = await client.db.from('messages').list()
                  .eq('nickname', '系统')
                  .eq('status', 'hidden');

              if (result.success && result.data && result.data.length > 0) {
                  const configMsg = result.data.find(m => m.content && m.content.startsWith('[PINNED_CONFIG]'));
                  if (configMsg) {
                      pinnedMessageIds = JSON.parse(configMsg.content.replace('[PINNED_CONFIG] ', ''));
                  }
              }
          } catch (e) {
              console.error('loadPinnedConfig error:', e);
          }
      }

      // 加载私密配置
      async function loadPrivateConfig() {
          try {
              const result = await client.db.from('messages').list()
                  .eq('nickname', '系统')
                  .eq('status', 'hidden');

              if (result.success && result.data && result.data.length > 0) {
                  const configMsg = result.data.find(m => m.content && m.content.startsWith('[PRIVATE_CONFIG]'));
                  if (configMsg) {
                      privateMessageIds = JSON.parse(configMsg.content.replace('[PRIVATE_CONFIG] ', ''));
                  }
              }
          } catch (e) {
              console.error('loadPrivateConfig error:', e);
          }
      }

      // 保存锁定配置
      async function savePinnedConfig() {
          try {
              const result = await client.db.from('messages').list()
                  .eq('nickname', '系统')
                  .eq('status', 'hidden');

              if (result.success && result.data && result.data.length > 0) {
                  const configMsg = result.data.find(m => m.content && m.content.startsWith('[PINNED_CONFIG]'));
                  if (configMsg) {
                      await client.db.from('messages').update()
                          .set({ content: '[PINNED_CONFIG] ' + JSON.stringify(pinnedMessageIds) })
                          .eq('id', configMsg.id);
                  } else {
                      // 创建新配置
                      await client.db.from('messages').insert().values({
                          nickname: '系统',
                          content: '[PINNED_CONFIG] ' + JSON.stringify(pinnedMessageIds),
                          status: 'hidden',
                          created_at: new Date().toISOString()
                      });
                  }
              }
          } catch (e) {
              console.error('savePinnedConfig error:', e);
          }
      }

      // 加载管理员消息列表
      async function loadAdminMessages() {
          try {
              // 先加载配置
              await Promise.all([loadPinnedConfig(), loadPrivateConfig(), loadAnnouncement()]);

              const result = await client.db.from('messages').list().order('created_at', 'desc');

              const loadingEl = document.getElementById('admin-loading');
              const emptyEl = document.getElementById('admin-empty-state');
              const listEl = document.getElementById('admin-messages-list');

              loadingEl.classList.add('hidden');

              if (!result.success || !result.data || result.data.length === 0) {
                  emptyEl.classList.remove('hidden');
                  listEl.innerHTML = '';
                  updateStats(0, 0, 0);
                  return;
              }

              emptyEl.classList.add('hidden');
              let messages = result.data.filter(m => {
                  if (m.nickname === '系统' || m.nickname === 'admin') {
                      if (!m.content) return false;
                      // 过滤掉配置消息
                      return !m.content.startsWith('[PINNED_CONFIG]') &&
                             !m.content.startsWith('[PRIVATE_CONFIG]') &&
                             !m.content.startsWith('[ANNOUNCEMENT]');
                  }
                  return true;
              });

              // 排序：已锁定优先，然后按时间
              messages.sort((a, b) => {
                  const aPinned = pinnedMessageIds.includes(a.id);
                  const bPinned = pinnedMessageIds.includes(b.id);
                  if (aPinned && !bPinned) return -1;
                  if (!aPinned && bPinned) return 1;
                  return new Date(b.created_at) - new Date(a.created_at);
              });

              // 更新统计
              const total = messages.length;
              const replied = messages.filter(m => m.reply).length;
              const pending = total - replied;
              updateStats(total, replied, pending);

              // 渲染消息列表
              listEl.innerHTML = messages.map(msg => {
                  const isPinned = pinnedMessageIds.includes(msg.id);
                  const isPrivate = privateMessageIds.includes(msg.id);
                  return `
                  <div class="p-6 hover:bg-gray-50 transition-smooth ${msg.status === 'hidden' ? 'opacity-50' : ''} ${isPinned ? 'bg-yellow-50 border-l-4 border-yellow-400' : ''} ${isPrivate ? 'bg-blue-50' : ''}" 
                       data-msg-id="${escapeHtml(msg.id)}" 
                       data-msg-nickname="${escapeHtml(msg.nickname)}"
                       data-msg-content="${escapeHtml(msg.content)}"
                       data-msg-status="${escapeHtml(msg.status || 'visible')}"
                       data-is-pinned="${isPinned}"
                       data-is-private="${isPrivate}">
                      <div class="flex items-start justify-between">
                          <div class="flex-1">
                              <div class="flex items-center space-x-3 mb-2">
                                  <div class="w-10 h-10 rounded-full ${isPrivate ? 'bg-gray-400' : 'gradient-primary'} flex items-center justify-center text-white font-semibold">
                                      ${isPrivate ? 'P' : escapeHtml(msg.nickname.charAt(0).toUpperCase())}
                                  </div>
                                  <div>
                                      <h3 class="font-semibold text-gray-900">${escapeHtml(msg.nickname)}</h3>
                                      <p class="text-xs text-gray-400">${formatDateTime(msg.created_at)}</p>
                                  </div>
                                  ${isPrivate ? '<span class="px-2 py-1 rounded-full text-xs bg-blue-200 text-blue-800">私密</span>' : ''}
                                  ${isPinned ? '<span class="px-2 py-1 rounded-full text-xs bg-yellow-200 text-yellow-800">已锁定</span>' : ''}
                                  ${msg.status === 'hidden' ? '<span class="px-2 py-1 rounded-full text-xs bg-gray-200 text-gray-600">隐藏</span>' : ''}
                                  ${msg.reply ? '<span class="px-2 py-1 rounded-full text-xs bg-green-100 text-green-600">已回复</span>' : '<span class="px-2 py-1 rounded-full text-xs bg-orange-100 text-orange-600">待回复</span>'}
                              </div>
                              <p class="text-gray-700 mb-3">${escapeHtml(msg.content)}</p>
                              ${msg.reply ? `
                              <div class="mt-3 pt-3 border-t border-gray-100 bg-blue-50 rounded-lg p-3">
                                  <div class="flex items-start space-x-2">
                                      <svg class="w-4 h-4 text-primary-600 mt-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                                      </svg>
                                      <div class="flex-1">
                                          <p class="text-xs text-primary-600 font-medium mb-1">管理员回复</p>
                                          <p class="text-sm text-gray-700">${escapeHtml(msg.reply)}</p>
                                          ${msg.replied_at ? `<p class="text-xs text-gray-400 mt-1">${formatDateTime(msg.replied_at)}</p>` : ''}
                                      </div>
                                  </div>
                              </div>
                              ` : ''}
                          </div>
                          <div class="flex flex-col space-y-2 ml-4">
                              <button
                                  class="msg-action-btn px-3 py-1.5 rounded-lg text-sm ${isPinned ? 'text-yellow-600 hover:bg-yellow-50' : 'text-gray-600 hover:bg-gray-50'} transition-smooth"
                                  data-action="toggle-pin">
                                  ${isPinned ? '取消锁定' : '锁定'}
                              </button>
                              <button
                                  class="msg-action-btn px-3 py-1.5 rounded-lg text-sm text-primary-600 hover:bg-primary-50 transition-smooth"
                                  data-action="open-reply">
                                  ${msg.reply ? '编辑回复' : '回复'}
                              </button>
                              <button
                                  class="msg-action-btn px-3 py-1.5 rounded-lg text-sm ${msg.status === 'hidden' ? 'text-green-600 hover:bg-green-50' : 'text-orange-600 hover:bg-orange-50'} transition-smooth"
                                  data-action="toggle-status">
                                  ${msg.status === 'hidden' ? '显示' : '隐藏'}
                              </button>
                              <button
                                  class="msg-action-btn px-3 py-1.5 rounded-lg text-sm ${isPrivate ? 'text-blue-600 hover:bg-blue-50' : 'text-gray-600 hover:bg-gray-50'} transition-smooth"
                                  data-action="toggle-private">
                                  ${isPrivate ? '取消私密' : '设为私密'}
                              </button>
                              <button
                                  class="msg-action-btn px-3 py-1.5 rounded-lg text-sm text-red-600 hover:bg-red-50 transition-smooth"
                                  data-action="delete-message">
                                  删除
                              </button>
                          </div>
                      </div>
                  </div>
                  `;
              }).join('');

              // 使用事件委托处理消息操作按钮点击
              document.getElementById('admin-messages-list').addEventListener('click', function(e) {
                  const btn = e.target.closest('.msg-action-btn');
                  if (!btn) return;

                  const msgEl = btn.closest('[data-msg-id]');
                  if (!msgEl) return;

                  const msgId = msgEl.dataset.msgId;
                  const nickname = msgEl.dataset.msgNickname;
                  const content = msgEl.dataset.msgContent;
                  const status = msgEl.dataset.msgStatus;
                  const isPinned = msgEl.dataset.isPinned === 'true';
                  const isPrivate = msgEl.dataset.isPrivate === 'true';
                  const action = btn.dataset.action;

                  switch(action) {
                      case 'toggle-pin':
                          togglePin(msgId, isPinned);
                          break;
                      case 'open-reply':
                          openReplyModal(msgId, nickname, content);
                          break;
                      case 'toggle-status':
                          toggleStatus(msgId, status);
                          break;
                      case 'toggle-private':
                          togglePrivate(msgId, isPrivate);
                          break;
                      case 'delete-message':
                          deleteMessage(msgId);
                          break;
                  }
              });
          } catch (error) {
              console.error('loadAdminMessages error:', error);
              showToast('加载消息失败', 'error');
          }
      }

      // 更新统计数据
      function updateStats(total, replied, pending) {
          document.getElementById('total-messages').textContent = total;
          document.getElementById('replied-messages').textContent = replied;
          document.getElementById('pending-messages').textContent = pending;
      }

      // 切换消息锁定状态
      async function togglePin(id, isPinned) {
          try {
              if (isPinned) {
                  pinnedMessageIds = pinnedMessageIds.filter(pid => pid !== id);
              } else {
                  if (!pinnedMessageIds.includes(id)) {
                      pinnedMessageIds.push(id);
                  }
              }

              await savePinnedConfig();

              showToast(!isPinned ? '已锁定' : '已解锁', 'success');
              loadAdminMessages();
          } catch (error) {
              console.error('togglePin error:', error);
              showToast('操作失败', 'error');
          }
      }

      // 切换私密状态
      async function togglePrivate(id, isPrivate) {
          try {
              if (isPrivate) {
                  privateMessageIds = privateMessageIds.filter(pid => pid !== id);
              } else {
                  if (!privateMessageIds.includes(id)) {
                      privateMessageIds.push(id);
                  }
              }

              await savePrivateConfig();

              showToast(!isPrivate ? '已设为私密' : '已取消私密', 'success');
              loadAdminMessages();
          } catch (error) {
              console.error('togglePrivate error:', error);
              showToast('操作失败', 'error');
          }
      }

      // 保存私密配置
      async function savePrivateConfig() {
          try {
              const result = await client.db.from('messages').list()
                  .eq('nickname', '系统')
                  .eq('status', 'hidden');

              if (result.success && result.data && result.data.length > 0) {
                  const configMsg = result.data.find(m => m.content && m.content.startsWith('[PRIVATE_CONFIG]'));
                  if (configMsg) {
                      await client.db.from('messages').update()
                          .set({ content: '[PRIVATE_CONFIG] ' + JSON.stringify(privateMessageIds) })
                          .eq('id', configMsg.id);
                  } else {
                      await client.db.from('messages').insert().values({
                          nickname: '系统',
                          content: '[PRIVATE_CONFIG] ' + JSON.stringify(privateMessageIds),
                          status: 'hidden',
                          created_at: new Date().toISOString()
                      });
                  }
              } else {
                  await client.db.from('messages').insert().values({
                      nickname: '系统',
                      content: '[PRIVATE_CONFIG] ' + JSON.stringify(privateMessageIds),
                      status: 'hidden',
                      created_at: new Date().toISOString()
                  });
              }
          } catch (e) {
              console.error('savePrivateConfig error:', e);
          }
      }

      // 打开回复模态框 - 已修复XSS漏洞
      function openReplyModal(id, nickname, content) {
          currentMessageId = id;
          document.getElementById('original-message').innerHTML = `
              <p class="text-sm text-gray-500 mb-1"><strong>${escapeHtml(nickname)}</strong> 说:</p>
              <p class="text-gray-700">${escapeHtml(content)}</p>
          `;
          document.getElementById('reply-content').value = '';
          document.getElementById('reply-modal').classList.remove('hidden');
      }

      // 关闭回复模态框
      document.getElementById('close-reply-modal').addEventListener('click', () => {
          document.getElementById('reply-modal').classList.add('hidden');
      });

      document.getElementById('cancel-reply').addEventListener('click', () => {
          document.getElementById('reply-modal').classList.add('hidden');
      });

      // 提交回复
      document.getElementById('submit-reply').addEventListener('click', async () => {
          const replyContent = document.getElementById('reply-content').value.trim();

          if (!replyContent) {
              showToast('请输入回复内容', 'warning');
              return;
          }

          try {
              const result = await client.db.from('messages').update()
                  .set({
                      reply: replyContent,
                      replied_at: new Date().toISOString()
                  })
                  .eq('id', currentMessageId);

              if (result.success) {
                  showToast('回复成功！', 'success');
                  document.getElementById('reply-modal').classList.add('hidden');
                  loadAdminMessages();
              } else {
                  showToast('回复失败: ' + result.message, 'error');
              }
          } catch (error) {
              console.error('submitReply error:', error);
              showToast('回复失败', 'error');
          }
      });

      // 切换消息显示状态
      async function toggleStatus(id, currentStatus) {
          const newStatus = currentStatus === 'hidden' ? 'visible' : 'hidden';

          try {
              const result = await client.db.from('messages').update()
                  .set({ status: newStatus })
                  .eq('id', id);

              if (result.success) {
                  showToast(newStatus === 'visible' ? '已显示' : '已隐藏', 'success');
                  loadAdminMessages();
              } else {
                  showToast('操作失败', 'error');
              }
          } catch (error) {
              console.error('toggleStatus error:', error);
              showToast('操作失败', 'error');
          }
      }

      // 删除消息
      async function deleteMessage(id) {
          if (!confirm('确定要删除这条消息吗？此操作不可撤销！')) {
              return;
          }

          try {
              const result = await client.db.from('messages').delete()
                  .eq('id', id);

              if (result.success) {
                  // 清除前台缓存，确保删除后立即生效
                  localStorage.removeItem('mb_cache_all_messages');
                  
                  showToast('删除成功', 'success');
                  loadAdminMessages();
              } else {
                  showToast('删除失败', 'error');
              }
          } catch (error) {
              console.error('deleteMessage error:', error);
              showToast('删除失败', 'error');
          }
      }

      // 页面加载完成后绑定登录表单事件
      console.log('Binding login form event directly...');
      const loginForm = document.getElementById('login-form');
      if (loginForm) {
          console.log('Login form found, binding submit event');
          loginForm.addEventListener('submit', async (e) => {
              e.preventDefault();
              console.log('Login form submitted!');

              // 确保客户端已初始化
              if (!client) {
                  console.log('Client not initialized, creating new...');
                  try {
                      client = aipexbase.createClient({
                          baseUrl: 'https://baas.kuafuai.net/baas-api',
                          apiKey: 'baas_zRu6UoOb'
                      });
                      console.log('Client created successfully');
                  } catch (err) {
                      console.error('Failed to create client:', err);
                      showToast('系统初始化失败，请刷新页面重试', 'error');
                      return;
                  }
              }

              const username = document.getElementById('username').value.trim();
              const password = document.getElementById('password').value;

              if (!username || !password) {
                  showToast('请填写用户名和密码', 'warning');
                  return;
              }

              const submitBtn = e.target.querySelector('button[type="submit"]');
              const originalText = submitBtn.innerHTML;
              submitBtn.disabled = true;
              submitBtn.innerHTML = '登录中...';

              try {
                  console.log('Attempting login with:', { username });
                  const result = await client.auth.login({
                      user_name: username,
                      password: password
                  });

                  console.log('Login result:', result);

                  if (result && result.success) {
                      showToast('登录成功！', 'success');
                      showAdminPage();
                      loadAdminMessages();
                  } else {
                      showToast('登录失败: ' + (result.message || '未知错误'), 'error');
                  }
              } catch (error) {
                  console.error('login error:', error);
                  showToast('登录失败，请检查用户名和密码', 'error');
              } finally {
                  submitBtn.disabled = false;
                  submitBtn.innerHTML = originalText;
              }
          });
      } else {
          console.error('Login form not found!');
      }
    </script>
</body>
</html>
