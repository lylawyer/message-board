<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线留言板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: {
                        50: '#eff6ff',
                        100: '#dbeafe',
                        200: '#bfdbfe',
                        300: '#93c5fd',
                        400: '#60a5fa',
                        500: '#3b82f6',
                        600: '#2563eb',
                        700: '#1d4ed8',
                        800: '#1e40af',
                        900: '#1e3a8a',
                    },
                },
                animation: {
                    'fade-in': 'fadeIn 0.3s ease-out',
                    'slide-up': 'slideUp 0.3s ease-out',
                    'slide-down': 'slideDown 0.3s ease-out',
                },
                keyframes: {
                    fadeIn: {
                        '0%': { opacity: '0' },
                        '100%': { opacity: '1' },
                    },
                    slideUp: {
                        '0%': { opacity: '0', transform: 'translateY(20px)' },
                        '100%': { opacity: '1', transform: 'translateY(0)' },
                    },
                    slideDown: {
                        '0%': { opacity: '0', transform: 'translateY(-20px)' },
                        '100%': { opacity: '1', transform: 'translateY(0)' },
                    },
                },
            }
        }
    }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .transition-smooth { @apply transition-all duration-300 ease-out; }
            .glass { @apply bg-white/80 backdrop-blur-md border border-white/20; }
            .gradient-primary { @apply bg-gradient-to-r from-primary-600 to-primary-500; }
            .gradient-subtle { @apply bg-gradient-to-br from-gray-50 to-gray-100; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/aipexbase-js/dist/aipexbase.umd.min.js"></script>
</head>
<body class="gradient-subtle min-h-screen">
    <!-- 顶部导航 -->
    <nav class="sticky top-0 z-50 glass border-b border-gray-200/50">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl gradient-primary flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                        </svg>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent">
                        在线留言板
                    </span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-sm text-gray-500">
                        <span id="message-count">0</span> 条留言
                    </div>
                    <a href="admin.html" class="px-4 py-2 rounded-lg text-gray-600 hover:text-primary-600 hover:bg-primary-50 transition-smooth text-sm font-medium">
                        管理后台
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fade-in">
        <!-- 发布留言区域 -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8">
            <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                <svg class="w-5 h-5 mr-2 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                发布留言
            </h2>
            <form id="message-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        昵称 <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="nickname" 
                        required
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-smooth"
                        placeholder="请输入您的昵称"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        留言内容 <span class="text-red-500">*</span>
                    </label>
                    <textarea 
                        id="content" 
                        required
                        rows="4"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-smooth resize-none"
                        placeholder="写下你想说的话..."
                    ></textarea>
                </div>
                <button 
                    type="submit"
                    class="w-full gradient-primary text-white font-medium py-3 px-6 rounded-xl hover:shadow-lg transition-smooth flex items-center justify-center space-x-2"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                    <span>发布留言</span>
                </button>
            </form>
        </div>

        <!-- 留言列表区域 -->
        <div class="space-y-4">
            <h2 class="text-lg font-semibold text-gray-900 flex items-center">
                <svg class="w-5 h-5 mr-2 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                </svg>
                全部留言
            </h2>
            <div id="messages-list" class="space-y-4">
                <!-- 留言将通过JS动态加载 -->
            </div>
            <div id="loading" class="text-center py-8 text-gray-400">
                <svg class="animate-spin w-8 h-8 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                加载中...
            </div>
            <div id="empty-state" class="hidden text-center py-12">
                <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <p class="text-gray-400">还没有留言，快来发表第一条吧！</p>
            </div>
        </div>
    </main>

    <!-- Toast 容器 -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-3"></div>

    <script>
        // 初始化客户端
        const client = aipexbase.createClient({
            baseUrl: 'https://baas.kuafuai.net/baas-api',
            apiKey: 'baas_zRu6UoOb'
        });

        // Toast 提示函数
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const styles = {
                success: 'bg-green-50 border-green-200 text-green-800',
                error: 'bg-red-50 border-red-200 text-red-800',
                warning: 'bg-yellow-50 border-yellow-200 text-yellow-800',
                info: 'bg-blue-50 border-blue-200 text-blue-800'
            };
            const icons = {
                success: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>',
                error: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>',
                warning: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>',
                info: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'
            };
            toast.className = `flex items-center px-4 py-3 rounded-xl border shadow-lg animate-slide-down ${styles[type]}`;
            toast.innerHTML = `
                <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">${icons[type]}</svg>
                <span class="font-medium">${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 格式化时间
        function formatDateTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hour}:${minute}`;
        }

        // 渲染留言列表
        function renderMessages(messages) {
            const listEl = document.getElementById('messages-list');
            const emptyEl = document.getElementById('empty-state');
            const loadingEl = document.getElementById('loading');
            const countEl = document.getElementById('message-count');
            
            loadingEl.classList.add('hidden');
            countEl.textContent = messages.length;
            
            if (messages.length === 0) {
                emptyEl.classList.remove('hidden');
                listEl.innerHTML = '';
                return;
            }
            
            // 置顶留言排在前面
            messages.sort((a, b) => {
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                return new Date(b.created_at) - new Date(a.created_at);
            });
            
            emptyEl.classList.add('hidden');
            listEl.innerHTML = messages.map(msg => `
                <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-lg transition-smooth animate-slide-up ${msg.pinned ? 'ring-2 ring-yellow-400' : ''}">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full gradient-primary flex items-center justify-center text-white font-semibold">
                                ${msg.nickname.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <div class="flex items-center space-x-2">
                                    <h3 class="font-semibold text-gray-900">${escapeHtml(msg.nickname)}</h3>
                                    ${msg.pinned ? '<span class="text-yellow-500">📌</span>' : ''}
                                </div>
                                <p class="text-xs text-gray-400">${formatDateTime(msg.created_at)}</p>
                            </div>
                        </div>
                    </div>
                    <p class="text-gray-700 leading-relaxed mb-3">${escapeHtml(msg.content)}</p>
                    ${msg.reply ? `
                        <div class="mt-3 pt-3 border-t border-gray-100 bg-blue-50 rounded-lg p-3">
                            <div class="flex items-start space-x-2">
                                <svg class="w-4 h-4 text-primary-600 mt-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                                </svg>
                                <div class="flex-1">
                                    <p class="text-xs text-primary-600 font-medium mb-1">管理员回复</p>
                                    <p class="text-sm text-gray-700">${escapeHtml(msg.reply)}</p>
                                    ${msg.replied_at ? `<p class="text-xs text-gray-400 mt-1">${formatDateTime(msg.replied_at)}</p>` : ''}
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 加载留言
        async function loadMessages() {
            try {
                const result = await client.db.from('messages').list()
                    .eq('status', 'visible')
                    .order('created_at', 'desc');
                if (result.success) {
                    renderMessages(result.data || []);
                } else {
                    showToast('加载留言失败: ' + result.message, 'error');
                }
            } catch (error) {
                console.error('加载留言失败:', error);
                showToast('加载留言失败，请稍后重试', 'error');
            }
        }

        // 提交留言
        document.getElementById('message-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nickname = document.getElementById('nickname').value.trim();
            const content = document.getElementById('content').value.trim();
            
            if (!nickname || !content) {
                showToast('请填写昵称和留言内容', 'warning');
                return;
            }
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>发布中...</span>
            `;
            
            try {
                const result = await client.db.from('messages').insert().values({
                    nickname: nickname,
                    content: content,
                    status: 'visible',
                    created_at: new Date().toISOString()
                });
                
                if (result.success) {
                    showToast('留言发布成功！', 'success');
                    document.getElementById('content').value = '';
                    await loadMessages();
                } else {
                    showToast('发布失败: ' + result.message, 'error');
                }
            } catch (error) {
                console.error('发布留言失败:', error);
                showToast('发布失败，请稍后重试', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // 页面加载时自动以访客身份登录，然后获取留言
        async function init() {
            try {
                // 尝试以访客身份登录
                await client.auth.login({
                    user_name: 'guest',
                    password: 'guest123'
                });
            } catch (e) {
                console.log('访客登录失败，可能是已登录状态');
            }
            // 加载留言
            loadMessages();
        }
        init();
    </script>
</body>
</html>
