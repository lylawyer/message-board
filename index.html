<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在野留言板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/aipexbase-js/dist/aipexbase.umd.min.js"></script>
    <script src="js/utils.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
                        accent: { 50: '#fdf4ff', 100: '#fae8ff', 200: '#f5d0fe', 300: '#f0abfc', 400: '#e879f9', 500: '#d946ef', 600: '#c026d3', 700: '#a21caf', 800: '#86198f', 900: '#701a75' }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .gradient-accent { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .gradient-subtle { background: linear-gradient(135deg, #e0e7ff 0%, #fce7f3 100%); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-pulse-custom { animation: pulse 2s ease-in-out infinite; }
        .blur-content { filter: blur(5px); user-select: none; }
        .toast { animation: fadeIn 0.3s ease-out; }
        
        /* 暗色模式样式 */
        .dark body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #e2e8f0; }
        .dark .gradient-subtle { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .dark .bg-white { background: #1e293b; color: #e2e8f0; }
        .dark .text-gray-800 { color: #e2e8f0; }
        .dark .text-gray-700 { color: #cbd5e1; }
        .dark .text-gray-600 { color: #94a3b8; }
        .dark .text-gray-500 { color: #64748b; }
        .dark .text-gray-400 { color: #475569; }
        .dark .text-gray-900 { color: #f1f5f9; }
        .dark .border-gray-300 { border-color: #334155; }
        .dark .border-gray-100 { border-color: #1e293b; }
        .dark .bg-gray-50 { background: #0f172a; }
        .dark .bg-gray-800 { background: #0f172a; }
        .dark .bg-blue-50 { background: #1e3a5f; }
        .dark .bg-purple-50 { background: #2d1b4e; }
        .dark .bg-yellow-50 { background: #3d2e00; }
        .dark .bg-green-50 { background: #1a3d2e; }
        .dark .bg-red-50 { background: #3d1a1a; }
        .dark .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .dark .shadow-md { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); }
        .dark .ring-2 { ring-color: #475569; }
    </style>
</head>
<body class="gradient-subtle min-h-screen">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Header -->
    <header class="gradient-primary text-white py-6 shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold">在野留言板</h1>
                    <p class="text-white/80 text-sm mt-1">记录生活，分享感悟</p>
                </div>
                <div class="flex items-center space-x-3">
                    <button id="dark-mode-toggle" class="text-sm text-white/80 hover:text-white transition px-2 py-1 rounded" title="切换暗色模式">
                        🌓
                    </button>
                    <button id="admin-login-btn" class="text-sm text-white/80 hover:text-white transition">
                        <span id="admin-status-text">管理员入口</span>
                    </button>
                    <div id="admin-badge" class="hidden px-3 py-1 bg-accent-500 rounded-full text-sm font-medium">
                        <span id="admin-badge-text">已登录</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Announcement -->
    <div id="announcement-section" class="hidden container mx-auto px-4 mt-4">
        <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-lg">
            <div class="flex">
                <span class="text-yellow-400 mr-2">📢</span>
                <p id="announcement-content" class="text-yellow-800 text-sm"></p>
            </div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-6">
        <!-- Message Form -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">✍️ 留言</h2>
            <form id="message-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">昵称 <span class="text-red-500">*</span></label>
                    <input type="text" id="nickname" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition" placeholder="请输入昵称（10字以内）" maxlength="10" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">留言内容 <span class="text-red-500">*</span></label>
                    <textarea id="content" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition resize-none" placeholder="写下你的留言..." maxlength="1000" required></textarea>
                    <div class="text-right text-xs text-gray-400 mt-1">
                        <span id="char-count">0</span> / 1000
                    </div>
                </div>
                <div id="admin-options" class="hidden p-4 bg-accent-50 rounded-lg space-y-3">
                    <h3 class="font-medium text-accent-700">管理员选项</h3>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">回复目标（留言ID）</label>
                        <input type="text" id="reply-to-id" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="留空则直接发布留言">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">回复内容</label>
                        <textarea id="reply-content" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm resize-none" placeholder="回复内容..." maxlength="500"></textarea>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="is-private" class="w-4 h-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500">
                        <span class="ml-2 text-sm text-gray-600">悄悄话（仅自己和可见回复可见）</span>
                    </label>
                </div>
                <div id="private-notice" class="hidden p-3 bg-blue-50 rounded-lg text-sm text-blue-700">
                    💡 悄悄话：发布后内容会被遮罩，输入昵称即可解锁查看
                </div>
                <button type="submit" id="submit-btn" class="w-full gradient-primary text-white py-3 px-6 rounded-lg font-medium hover:opacity-90 transition disabled:opacity-50 flex items-center justify-center space-x-2">
                    <span>发布留言</span>
                </button>
            </form>
        </div>

        <!-- Messages List -->
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-semibold text-gray-800">留言 (<span id="message-count">0</span>)</h2>
                <div class="flex items-center space-x-2">
                    <input type="text" id="search-input" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition" placeholder="搜索留言..." maxlength="50">
                    <button id="search-btn" class="px-3 py-1.5 bg-primary-500 text-white rounded-lg text-sm hover:bg-primary-600 transition">
                        🔍
                    </button>
                    <button id="clear-search-btn" class="hidden px-3 py-1.5 bg-gray-200 text-gray-600 rounded-lg text-sm hover:bg-gray-300 transition">
                        ✕
                    </button>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading" class="bg-white rounded-xl shadow-md p-8 text-center">
                <div class="animate-spin w-10 h-10 border-4 border-primary-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                <p class="text-gray-500">加载中...</p>
            </div>

            <!-- Error State -->
            <div id="error-state" class="hidden bg-white rounded-xl shadow-md p-8 text-center">
                <div class="text-red-500 text-5xl mb-4">😢</div>
                <p id="error-msg" class="text-gray-600 mb-4">加载失败</p>
                <button onclick="loadMessages()" class="px-4 py-2 bg-primary-500 text-white rounded-lg hover:bg-primary-600 transition">
                    重试
                </button>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden bg-white rounded-xl shadow-md p-8 text-center">
                <div class="text-gray-300 text-6xl mb-4">💭</div>
                <p class="text-gray-500">还没有留言，写下第一条吧~</p>
            </div>

            <!-- Messages -->
            <div id="messages-list" class="space-y-4"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-400 py-6 mt-12">
        <div class="container mx-auto px-4 text-center text-sm">
            <p>在野留言板 · 记录每一刻</p>
        </div>
    </footer>

    <!-- Private Content Modal -->
    <div id="private-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">🔓 解锁悄悄话</h3>
            <p class="text-sm text-gray-600 mb-4">请输入你的昵称，查看悄悄话内容和管理员回复：</p>
            <input type="text" id="modal-nickname" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4" placeholder="请输入昵称" maxlength="10">
            <div class="flex space-x-3">
                <button onclick="unlockPrivateMessages()" class="flex-1 bg-primary-500 text-white py-2 rounded-lg hover:bg-primary-600 transition">
                    查看我的悄悄话
                </button>
                <button onclick="closePrivateModal()" class="px-4 py-2 bg-gray-200 text-gray-600 rounded-lg hover:bg-gray-300 transition">
                    取消
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            BAAS_API_URL: 'https://baas.kuafuai.net/baas-api',
            API_KEY: 'baas_zRu6UoOb',
            // 管理员密钥哈希值（SHA-256），原始密钥通过 prompt 输入后验证
            ADMIN_KEY_HASH: '77323b369c27f8af06ef01ae9c46d234852a266ccddd2ad1dc63f2e064ce7ac3', // 强密钥
            NICKNAME_MAX: 10,
            CONTENT_MAX: 1000,
            REQUEST_TIMEOUT: 10000,
            FORBIDDEN_NICKNAMES: ['管理员', '系统', 'admin', '系统通知', '官方', '系统公告'],
            MAX_LOGIN_ATTEMPTS: 3,
            LOCKOUT_DURATION: 5 * 60 * 1000 // 5分钟锁定
        };

        let pinnedMessageIds = [];
        let allMessagesCache = null; // 缓存所有消息数据
        let searchQuery = ''; // 当前搜索关键词
        let client = null; // SDK 客户端

        // 初始化 SDK 客户端
        function initClient() {
            if (!client && typeof aipexbase !== 'undefined') {
                client = aipexbase.createClient({
                    baseUrl: CONFIG.BAAS_API_URL,
                    apiKey: CONFIG.API_KEY
                });
                console.log('✅ SDK 客户端初始化完成');
            }
            return client;
        }

        // ==================== 搜索功能 ====================
        function filterMessagesBySearch(messages) {
            if (!searchQuery) return messages;
            const query = searchQuery.toLowerCase();
            return messages.filter(msg => 
                msg.nickname.toLowerCase().includes(query) || 
                msg.content.toLowerCase().includes(query) ||
                (msg.reply && msg.reply.toLowerCase().includes(query))
            );
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.trim();
            const clearBtn = document.getElementById('clear-search-btn');
            clearBtn.classList.toggle('hidden', !searchQuery);
            
            // 实时搜索
            if (allMessagesCache) {
                const filtered = filterMessagesBySearch(allMessagesCache);
                renderMessages(filtered);
            }
        });

        document.getElementById('search-btn').addEventListener('click', () => {
            searchQuery = document.getElementById('search-input').value.trim();
            if (allMessagesCache) {
                const filtered = filterMessagesBySearch(allMessagesCache);
                renderMessages(filtered);
            }
        });

        document.getElementById('clear-search-btn').addEventListener('click', () => {
            document.getElementById('search-input').value = '';
            searchQuery = '';
            document.getElementById('clear-search-btn').classList.add('hidden');
            if (allMessagesCache) {
                renderMessages(allMessagesCache);
            }
        });

        // ==================== 初始化 ====================
        window.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 页面加载，开始初始化...');
            
            // 初始化 SDK 客户端
            initClient();
            
            // 统一加载所有数据
            await loadAllData();
        });

        // ==================== 统一数据加载（使用 SDK）====================
        async function loadAllData() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-state');
            const emptyEl = document.getElementById('empty-state');
            const errorMsg = document.getElementById('error-msg');

            try {
                console.log('开始加载所有数据...');
                
                // 先尝试从缓存加载
                const cachedData = Cache.get('all_messages');
                if (cachedData) {
                    console.log('✅ 使用缓存数据');
                    allMessagesCache = cachedData;
                    
                    // 解析置顶消息ID
                    const configMsgs = cachedData.filter(m => 
                        m.nickname === '系统' && m.status === 'hidden'
                    );
                    const pinnedMsgs = configMsgs.filter(m => 
                        m.content && m.content.startsWith('[PINNED]')
                    );
                    pinnedMessageIds = pinnedMsgs.map(m => m.id);
                    
                    // 加载公告
                    loadAnnouncementFromCache(cachedData);
                    
                    // 渲染留言列表
                    renderMessages(cachedData);
                    loadingEl.classList.add('hidden');
                    return;
                }
                
                // 缓存未命中，使用 SDK 调用 API
                initClient();
                if (!client) {
                    throw new Error('SDK 客户端未初始化');
                }
                
                const result = await client.db.from('messages').list();
                
                // 无论成功失败，先隐藏加载动画
                loadingEl.classList.add('hidden');
                
                if (result.success && result.data) {
                    // 保存到缓存
                    Cache.set('all_messages', result.data);
                    allMessagesCache = result.data;
                    
                    // 解析置顶消息ID
                    const configMsgs = result.data.filter(m => 
                        m.nickname === '系统' && m.status === 'hidden'
                    );
                    const pinnedMsgs = configMsgs.filter(m => 
                        m.content && m.content.startsWith('[PINNED]')
                    );
                    pinnedMessageIds = pinnedMsgs.map(m => m.id);
                    
                    // 加载公告
                    loadAnnouncementFromCache(result.data);
                    
                    // 渲染留言列表
                    renderMessages(result.data);
                    
                    console.log('✅ 数据加载完成（已缓存）');
                } else {
                    console.error('数据加载失败:', result.message);
                    errorEl.classList.remove('hidden');
                    errorMsg.textContent = result.message || '加载失败';
                }
            } catch (error) {
                console.error('数据加载失败:', error);
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
                errorMsg.textContent = error.message || '网络错误';
            }
        }

        function showError(message) {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-state');
            const errorMsg = document.getElementById('error-msg');
            
            loadingEl.classList.add('hidden');
            errorEl.classList.remove('hidden');
            errorMsg.textContent = message;
        }

        // initSDK 函数已移除（使用 initClient 替代）

        // fetchWithTimeout 函数已移除（使用 SDK 替代）

        async function loadAnnouncementFromCache(data) {
            try {
                // 查找公告（nickname=系统 且 content以[ANNOUNCEMENT]开头）
                const announcementMsg = data.find(m => 
                    m.nickname === '系统' && 
                    m.status === 'hidden' && 
                    m.content && m.content.startsWith('[ANNOUNCEMENT]')
                );
                if (announcementMsg) {
                    const content = announcementMsg.content.replace('[ANNOUNCEMENT] ', '');
                    if (content && content !== '暂无公告') {
                        document.getElementById('announcement-content').textContent = content;
                        document.getElementById('announcement-section').classList.remove('hidden');
                    }
                }
            } catch (e) {
                console.error('加载公告失败:', e);
            }
        }

        // ==================== 留言加载 ====================
        async function loadMessages() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-state');
            const emptyEl = document.getElementById('empty-state');
            const listEl = document.getElementById('messages-list');
            const errorMsg = document.getElementById('error-msg');

            loadingEl.classList.remove('hidden');
            errorEl.classList.add('hidden');
            emptyEl.classList.add('hidden');
            listEl.innerHTML = '';

            try {
                console.log('开始加载留言...');
                
                // 如果有缓存，直接使用缓存
                if (allMessagesCache) {
                    renderMessages(allMessagesCache);
                    loadingEl.classList.add('hidden');
                    return;
                }
                
                // 否则使用 SDK 重新调用
                initClient();
                if (!client) {
                    throw new Error('SDK 客户端未初始化');
                }
                
                const result = await client.db.from('messages').list();
                console.log('API返回结果:', result);

                loadingEl.classList.add('hidden');

                if (result.success) {
                    allMessagesCache = result.data || [];
                    renderMessages(allMessagesCache);
                } else {
                    errorEl.classList.remove('hidden');
                    errorMsg.textContent = result.message || '加载失败';
                }
            } catch (error) {
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
                errorMsg.textContent = error.message || '网络错误';
                console.error('加载留言失败:', error);
            }
        }

        // ==================== 留言渲染 ====================
        function renderMessages(messages) {
            const listEl = document.getElementById('messages-list');
            const emptyEl = document.getElementById('empty-state');
            const countEl = document.getElementById('message-count');

            // 过滤：只显示公开留言(status=visible)和悄悄话(status=private)
            const visibleMsgs = messages.filter(msg => {
                const status = msg.status || 'visible';
                if (status === 'visible' || status === 'private') return true;
                // 旧数据：hidden 状态不显示（管理员可见的私密留言）
                if (status === 'hidden') return false;
                return true;
            });

            console.log('过滤后可见留言:', visibleMsgs.length, visibleMsgs.map(m => ({nickname: m.nickname, status: m.status})));
            countEl.textContent = visibleMsgs.length;

            if (visibleMsgs.length === 0) {
                emptyEl.classList.remove('hidden');
                listEl.innerHTML = '';
                return;
            }

            emptyEl.classList.add('hidden');

            // 置顶消息排在前面
            visibleMsgs.sort((a, b) => {
                const aPinned = pinnedMessageIds.includes(a.id);
                const bPinned = pinnedMessageIds.includes(b.id);
                if (aPinned && !bPinned) return -1;
                if (!aPinned && bPinned) return 1;
                return new Date(b.created_at) - new Date(a.created_at);
            });

            // 获取当前用户昵称（用于解锁悄悄话）
            const currentNickname = localStorage.getItem('visitor_nickname') || '';

            listEl.innerHTML = visibleMsgs.map(msg => {
                const isPinned = pinnedMessageIds.includes(msg.id);
                const isAdminPost = msg.nickname === '管理员';
                const isPrivate = msg.status === 'private';
                const hasReply = msg.reply && msg.reply.trim();
                
                // 检查是否解锁了这条悄悄话（昵称匹配）
                const isUnlocked = isPrivate && msg.nickname === currentNickname;
                
                // 悄悄话占位HTML
                const privatePlaceholder = `
                    <div class="bg-gradient-to-r from-purple-50 to-pink-50 rounded-lg p-4 border border-purple-100">
                        <div class="flex items-center space-x-2 text-purple-600 mb-2">
                            <span>🤫</span>
                            <span class="font-medium">悄悄话</span>
                        </div>
                        <p class="text-gray-500 italic text-sm">
                            ${isUnlocked ? escapeHtml(msg.content) : '内容已隐藏，输入昵称解锁查看'}
                        </p>
                        ${hasReply ? `
                        <div class="mt-3 pt-3 border-t border-purple-200">
                            <p class="text-xs text-primary-600 font-medium mb-1">💎 管理员回复</p>
                            <p class="text-sm text-gray-700">${escapeHtml(msg.reply)}</p>
                            ${msg.replied_at ? `<p class="text-xs text-gray-400 mt-1">${formatDateTime(msg.replied_at)}</p>` : ''}
                        </div>
                        ` : `
                        <p class="text-xs text-gray-400 mt-2">等待管理员回复中...</p>
                        `}
                    </div>
                `;

                // 公开留言HTML
                const publicContent = `
                    <p class="text-gray-700 leading-relaxed mb-3">${escapeHtml(msg.content)}</p>
                    ${hasReply ? `
                    <div class="mt-3 pt-3 border-t border-gray-100 bg-blue-50 rounded-lg p-3">
                        <p class="text-xs text-primary-600 font-medium mb-1">💎 管理员回复</p>
                        <p class="text-sm text-gray-700">${escapeHtml(msg.reply)}</p>
                        ${msg.replied_at ? `<p class="text-xs text-gray-400 mt-1">${formatDateTime(msg.replied_at)}</p>` : ''}
                    </div>
                    ` : ''}
                `;

                return `
                <div class="bg-white rounded-xl shadow-md p-5 ${isPinned ? 'ring-2 ring-yellow-400' : ''} animate-fade-in">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full ${isAdminPost ? 'bg-gradient-to-r from-purple-500 to-pink-500' : isPrivate ? 'bg-gradient-to-r from-purple-400 to-pink-400' : 'gradient-primary'} flex items-center justify-center text-white font-semibold">
                                ${escapeHtml(msg.nickname.charAt(0).toUpperCase())}
                            </div>
                            <div>
                                <div class="flex items-center space-x-2">
                                    <h3 class="font-semibold text-gray-900">${escapeHtml(msg.nickname)}${isPrivate ? ' <span class="text-xs bg-purple-100 text-purple-600 px-2 py-0.5 rounded-full">🤫</span>' : ''}</h3>
                                    ${isAdminPost ? '<span class="px-2 py-0.5 rounded-full text-xs bg-purple-100 text-purple-600">💎 官方</span>' : ''}
                                    ${isPinned ? '<span class="text-yellow-500">📌</span>' : ''}
                                </div>
                                <p class="text-xs text-gray-400">${formatDateTime(msg.created_at)}</p>
                            </div>
                        </div>
                    </div>
                    ${isPrivate ? privatePlaceholder : publicContent}
                </div>
                `;
            }).join('');
        }

        // ==================== 留言提交 ====================
        document.getElementById('message-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const originalText = submitBtn.innerHTML;

            let nickname = document.getElementById('nickname').value.trim();
            const content = document.getElementById('content').value.trim();
            const isPrivate = document.getElementById('is-private').checked;
            const replyToId = document.getElementById('reply-to-id').value.trim();
            const replyContent = document.getElementById('reply-content').value.trim();

            if (!nickname || !content) {
                showToast('请填写昵称和留言内容', 'warning');
                return;
            }
            if (nickname.length > CONFIG.NICKNAME_MAX) {
                showToast(`昵称不能超过${CONFIG.NICKNAME_MAX}个字`, 'warning');
                return;
            }
            if (content.length > CONFIG.CONTENT_MAX) {
                showToast(`留言内容不能超过${CONFIG.CONTENT_MAX}字`, 'warning');
                return;
            }

            // 保存访客昵称
            localStorage.setItem('visitor_nickname', nickname);

            const adminLoggedIn = await checkIfAdmin();
            if (adminLoggedIn) {
                nickname = '管理员';
            } else if (isForbiddenNickname(nickname)) {
                showToast('该昵称包含受限关键词', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>提交中...</span>
            `;

            try {
                // 初始化 SDK 客户端
                initClient();
                if (!client) {
                    throw new Error('SDK 客户端未初始化');
                }
                
                // 管理员回复逻辑
                if (adminLoggedIn && replyToId && replyContent) {
                    const updateResult = await client.db.from('messages').update()
                        .set({
                            reply: replyContent,
                            replied_at: new Date().toISOString()
                        })
                        .eq('id', replyToId);

                    if (updateResult.success) {
                        showToast('回复成功！');
                        document.getElementById('reply-to-id').value = '';
                        document.getElementById('reply-content').value = '';
                        await loadMessages();
                    } else {
                        showToast('回复失败: ' + (updateResult.message || '未知错误'), 'error');
                    }
                    return;
                }

                // 普通留言/悄悄话 - 使用 SDK
                console.log('提交留言:', { nickname, content, status: isPrivate ? 'private' : 'visible' });
                
                // 准备提交数据
                const submitData = {
                    nickname: nickname,
                    content: content,
                    status: isPrivate ? 'private' : 'visible',
                    created_at: new Date().toISOString()
                };
                
                const result = await client.db.from('messages').insert().values(submitData);
                
                console.log('提交结果:', result);

                if (result.success) {
                    // 清除缓存，确保下次加载最新数据
                    Cache.remove('all_messages');
                    
                    if (isPrivate) {
                        showToast('悄悄话发布成功，管理员回复后会在这里显示');
                    } else {
                        showToast('留言发布成功！');
                    }
                    document.getElementById('nickname').value = '';
                    document.getElementById('content').value = '';
                    document.getElementById('is-private').checked = false;
                    document.getElementById('char-count').textContent = '0';
                    document.getElementById('private-notice').classList.add('hidden');
                    await loadMessages();
                } else {
                    showToast('发布失败: ' + (result.message || '未知错误'), 'error');
                }
            } catch (error) {
                console.error('提交失败:', error);
                showToast('发布失败，请稍后重试', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // 管理员登录 - 跳转到管理后台
        document.getElementById('admin-login-btn').addEventListener('click', () => {
            window.location.href = 'admin.html';
        });

        async function checkIfAdmin() {
            return sessionStorage.getItem('is_admin') === 'true';
        }

        function updateAdminUI(isAdmin) {
            const btn = document.getElementById('admin-login-btn');
            const badge = document.getElementById('admin-badge');
            const options = document.getElementById('admin-options');

            if (isAdmin) {
                btn.classList.add('hidden');
                badge.classList.remove('hidden');
                options.classList.remove('hidden');
            } else {
                btn.classList.remove('hidden');
                badge.classList.add('hidden');
                options.classList.add('hidden');
            }
        }

        function isForbiddenNickname(nickname) {
            const lower = nickname.toLowerCase();
            return CONFIG.FORBIDDEN_NICKNAMES.some(fn => lower.includes(fn.toLowerCase()));
        }

        // ==================== 悄悄话解锁 ====================
        function openPrivateModal() {
            document.getElementById('private-modal').classList.remove('hidden');
            document.getElementById('modal-nickname').focus();
        }

        function closePrivateModal() {
            document.getElementById('private-modal').classList.add('hidden');
        }

        function unlockPrivateMessages() {
            const nickname = document.getElementById('modal-nickname').value.trim();
            if (!nickname) {
                showToast('请输入昵称', 'warning');
                return;
            }
            
            // 保存到 localStorage
            localStorage.setItem('visitor_nickname', nickname);
            
            closePrivateModal();
            showToast(`已解锁 ${nickname} 的悄悄话`);
            
            // 重新渲染留言列表
            loadMessages();
        }

        // 点击悄悄话时弹出解锁
        document.getElementById('messages-list').addEventListener('click', (e) => {
            if (e.target.closest('.private-locked')) {
                openPrivateModal();
            }
        });

        // ==================== 工具函数 ====================
        // sha256 函数已移至 js/utils.js

        // escapeHtml 函数已移至 js/utils.js

        // showToast 函数已移至 js/utils.js

        // 悄悄话提示
        document.getElementById('is-private').addEventListener('change', (e) => {
            document.getElementById('private-notice').classList.toggle('hidden', !e.target.checked);
        });

        // 回车提交
        document.getElementById('modal-nickname').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                unlockPrivateMessages();
            }
        });

        // 页面加载时检查管理员状态
        (async () => {
            const isAdmin = await checkIfAdmin();
            updateAdminUI(isAdmin);
            
            // 初始化暗色模式
            DarkMode.init();
        })();

        // 暗色模式切换
        document.getElementById('dark-mode-toggle').addEventListener('click', () => {
            const enabled = DarkMode.toggle();
            showToast(enabled ? '已开启暗色模式' : '已关闭暗色模式', 'info');
        });
    </script>
</body>
</html>
