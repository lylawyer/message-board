<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在野留言板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                 colors: {
                    primary: {
                        50: '#eff6ff',
                        100: '#dbeafe',
                        200: '#bfdbfe',
                        300: '#93c5fd',
                        400: '#60a5fa',
                        500: '#3b82f6',
                        600: '#2563eb',
                        700: '#1d4ed8',
                        800: '#1e40af',
                        900: '#1e3a8a',
                    },
                },
                animation: {
                    'fade-in': 'fadeIn 0.3s ease-out',
                    'slide-up': 'slideUp 0.3s ease-out',
                    'slide-down': 'slideDown 0.3s ease-out',
                },
                keyframes: {
                    fadeIn: {
                        '0%': { opacity: '0' },
                        '100%': { opacity: '1' },
                    },
                    slideUp: {
                        '0%': { opacity: '0', transform: 'translateY(20px)' },
                        '100%': { opacity: '1', transform: 'translateY(0)' },
                    },
                    slideDown: {
                        '0%': { opacity: '0', transform: 'translateY(-20px)' },
                        '100%': { opacity: '1', transform: 'translateY(0)' },
                    },
                },
            }
        }
    }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .transition-smooth { @apply transition-all duration-300 ease-out; }
            .glass { @apply bg-white/80 backdrop-blur-md border border-white/20; }
            .gradient-primary { @apply bg-gradient-to-r from-primary-600 to-primary-500; }
            .gradient-subtle { @apply bg-gradient-to-br from-gray-50 to-gray-100; }
        }
    </style>
    <!-- 加载 aipexbase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/aipexbase-js@latest/dist/aipexbase.umd.min.js"></script>
</head>
<body class="gradient-subtle min-h-screen">
    <!-- 顶部导航 -->
    <nav class="sticky top-0 z-50 glass border-b border-gray-200/50">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl gradient-primary flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                        </svg>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent">
                        在野留言板
                    </span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-sm text-gray-500">
                        <span id="message-count">0</span> 条留言
                    </div>
                    <a href="admin.html" class="px-4 py-2 rounded-lg text-gray-600 hover:text-primary-600 hover:bg-primary-50 transition-smooth text-sm font-medium">
                        管理后台
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fade-in">
        <!-- 公告区域 -->
        <div id="announcement-section" class="bg-gradient-to-r from-purple-50 to-pink-50 rounded-2xl shadow-lg p-6 mb-8 border border-purple-100 hidden">
            <div class="flex items-start space-x-4">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center shadow-lg flex-shrink-0">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.989 3.989 0 01-1.564-.317z"/>
                    </svg>
                </div>
                <div class="flex-1">
                    <div class="flex items-center space-x-2 mb-2">
                        <h2 class="text-lg font-bold text-purple-900">📢 公告</h2>
                        <span id="announcement-time" class="text-xs text-purple-400"></span>
                    </div>
                    <p id="announcement-content" class="text-gray-700 leading-relaxed"></p>
                </div>
            </div>
        </div>

        <!-- 发布留言区域 -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8">
            <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                <svg class="w-5 h-5 mr-2 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                发布留言
            </h2>
            <form id="message-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        昵称 <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="text"
                        id="nickname"
                        required
                        maxlength="20"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-smooth"
                        placeholder="输入你的昵称（最多20字）"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        留言内容 <span class="text-red-500">*</span>
                    </label>
                    <textarea
                        id="content"
                        required
                        rows="4"
                        maxlength="1000"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-smooth resize-none"
                        placeholder="写下你想说的话...（最多1000字）"
                    ></textarea>
                    <p class="text-xs text-gray-400 mt-1 text-right"><span id="char-count">0</span>/1000</p>
                </div>
                <!-- 私密留言 -->
                <div class="flex items-center space-x-3 p-4 bg-gray-50 rounded-xl">
                    <input
                        type="checkbox"
                        id="is-private"
                        class="w-5 h-5 rounded border-gray-300 text-primary-600 focus:ring-primary-500"
                    >
                    <label for="is-private" class="flex items-center space-x-2 cursor-pointer">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        <span class="text-sm text-gray-600">私密留言（仅管理员可见）</span>
                    </label>
                </div>
                <button
                    type="submit"
                    id="submit-btn"
                    class="w-full gradient-primary text-white font-medium py-3 px-6 rounded-xl hover:shadow-lg transition-smooth flex items-center justify-center space-x-2"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                    <span>发布留言</span>
                </button>
            </form>
        </div>

        <!-- 留言列表区域 -->
        <div class="space-y-4">
            <h2 class="text-lg font-semibold text-gray-900 flex items-center">
                <svg class="w-5 h-5 mr-2 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                </svg>
                所有留言
            </h2>
            <div id="messages-list" class="space-y-4"></div>
            <div id="loading" class="text-center py-8 text-gray-400">
                <svg class="animate-spin w-8 h-8 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p>加载中...</p>
            </div>
            <div id="error-state" class="hidden text-center py-8">
                <svg class="w-16 h-16 mx-auto mb-4 text-red-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <p class="text-red-400 mb-2">加载失败</p>
                <p id="error-msg" class="text-gray-400 text-sm mb-2"></p>
                <button onclick="retryLoad()" class="text-primary-600 hover:text-primary-700 text-sm font-medium">点击重试</button>
            </div>
            <div id="empty-state" class="hidden text-center py-12">
                <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <p class="text-gray-400">还没有留言，快来抢沙发吧！</p>
            </div>
        </div>
    </main>

    <!-- Toast 提示 -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-3"></div>

    <script>
        // ========== 全局变量 ==========
        var client = null;
        const API_TIMEOUT = 10000; // 10秒超时
        const NICKNAME_MAX = 20;
        const CONTENT_MAX = 1000;
        let pinnedMessageIds = [];
        let privateMessageIds = [];

        // ========== 初始化 aipexbase 客户端 ==========
        function initClient() {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                const maxAttempts = 100; // 最多等待5秒 (100 * 50ms)

                function tryInit() {
                    attempts++;
                    if (typeof aipexbase !== 'undefined') {
                        try {
                            client = aipexbase.createClient({
                                baseUrl: 'https://baas.kuafuai.net/baas-api',
                                apiKey: 'baas_zRu6UoOb'
                            });
                            console.log('aipexbase 客户端初始化成功');
                            resolve(client);
                        } catch (e) {
                            reject(e);
                        }
                    } else if (attempts >= maxAttempts) {
                        reject(new Error('SDK 加载超时，请刷新页面'));
                    } else {
                        setTimeout(tryInit, 50);
                    }
                }

                tryInit();
            });
        }

        // ========== 工具函数 ==========
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const styles = {
                success: 'bg-green-50 border-green-200 text-green-800',
                error: 'bg-red-50 border-red-200 text-red-800',
                warning: 'bg-yellow-50 border-yellow-200 text-yellow-800',
                info: 'bg-blue-50 border-blue-200 text-blue-800'
            };
            const icons = {
                success: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>',
                error: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>',
                warning: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>',
                info: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'
            };
            toast.className = `flex items-center px-4 py-3 rounded-xl border shadow-lg animate-slide-down ${styles[type]}`;
            toast.innerHTML = `
                <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">${icons[type]}</svg>
                <span class="font-medium">${escapeHtml(message)}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hour}:${minute}`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== API 请求封装 ==========
        function fetchWithTimeout(promise, timeout = API_TIMEOUT) {
            return Promise.race([
                promise,
                new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('请求超时，请检查网络')), timeout)
                )
            ]);
        }

        // ========== 数据库操作 ==========
        async function loadAllConfig() {
            try {
                const result = await fetchWithTimeout(
                    client.db.from('messages').list()
                        .eq('nickname', '系统')
                        .eq('status', 'hidden')
                );
                if (result.success && result.data) {
                    const pinnedConfig = result.data.find(m => m.content && m.content.startsWith('[PINNED_CONFIG]'));
                    if (pinnedConfig) {
                        pinnedMessageIds = JSON.parse(pinnedConfig.content.replace('[PINNED_CONFIG] ', ''));
                    }
                    const privateConfig = result.data.find(m => m.content && m.content.startsWith('[PRIVATE_CONFIG]'));
                    if (privateConfig) {
                        privateMessageIds = JSON.parse(privateConfig.content.replace('[PRIVATE_CONFIG] ', ''));
                    }
                }
            } catch (e) {
                console.error('加载配置失败:', e);
            }
        }

        async function loadAnnouncement() {
            try {
                const result = await fetchWithTimeout(
                    client.db.from('messages').list()
                        .eq('nickname', '系统')
                        .eq('status', 'hidden')
                );
                if (result.success && result.data) {
                    const announcementMsg = result.data.find(m => m.content && m.content.startsWith('[ANNOUNCEMENT]'));
                    if (announcementMsg) {
                        const content = announcementMsg.content.replace('[ANNOUNCEMENT] ', '');
                        if (content && content !== '暂无公告') {
                            document.getElementById('announcement-content').textContent = content;
                            document.getElementById('announcement-time').textContent = formatDateTime(announcementMsg.created_at);
                            document.getElementById('announcement-section').classList.remove('hidden');
                        }
                    }
                }
            } catch (e) {
                console.error('加载公告失败:', e);
            }
        }

        // ========== 渲染留言 ==========
        function renderMessages(messages) {
            const listEl = document.getElementById('messages-list');
            const emptyEl = document.getElementById('empty-state');
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-state');
            const countEl = document.getElementById('message-count');

            loadingEl.classList.add('hidden');
            errorEl.classList.add('hidden');
            countEl.textContent = messages.length;

            if (messages.length === 0) {
                emptyEl.classList.remove('hidden');
                listEl.innerHTML = '';
                return;
            }

            emptyEl.classList.add('hidden');

            // 置顶排在前面
            messages.sort((a, b) => {
                const aPinned = pinnedMessageIds.includes(a.id);
                const bPinned = pinnedMessageIds.includes(b.id);
                if (aPinned && !bPinned) return -1;
                if (!aPinned && bPinned) return 1;
                return new Date(b.created_at) - new Date(a.created_at);
            });

            listEl.innerHTML = messages.map(msg => {
                const isPinned = pinnedMessageIds.includes(msg.id);
                const isAdminPost = msg.nickname === '管理员';
                const isPrivate = privateMessageIds.includes(msg.id);

                if (isPrivate) {
                    return `
                    <div class="bg-gray-50 rounded-xl shadow-md p-5 border border-gray-200">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full bg-gray-400 flex items-center justify-center text-white font-semibold">🔒</div>
                            <div>
                                <h3 class="font-semibold text-gray-600">${escapeHtml(msg.nickname)}</h3>
                                <p class="text-xs text-gray-400">${formatDateTime(msg.created_at)}</p>
                            </div>
                        </div>
                        <div class="mt-3 p-4 bg-gray-100 rounded-lg text-center">
                            <p class="text-sm text-gray-500">🔒 私密留言，仅管理员可见</p>
                        </div>
                    </div>
                    `;
                }

                return `
                <div class="bg-white rounded-xl shadow-md p-5 ${isPinned ? 'ring-2 ring-yellow-400' : ''}">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-full ${isAdminPost ? 'bg-gradient-to-r from-purple-500 to-pink-500' : 'gradient-primary'} flex items-center justify-center text-white font-semibold">
                                ${escapeHtml(msg.nickname.charAt(0).toUpperCase())}
                            </div>
                            <div>
                                <div class="flex items-center space-x-2">
                                    <h3 class="font-semibold text-gray-900">${escapeHtml(msg.nickname)}</h3>
                                    ${isAdminPost ? '<span class="px-2 py-0.5 rounded-full text-xs bg-purple-100 text-purple-600">💎 官方</span>' : ''}
                                    ${isPinned ? '<span class="text-yellow-500">📌</span>' : ''}
                                </div>
                                <p class="text-xs text-gray-400">${formatDateTime(msg.created_at)}</p>
                            </div>
                        </div>
                    </div>
                    <p class="text-gray-700 leading-relaxed mb-3">${escapeHtml(msg.content)}</p>
                    ${msg.reply ? `
                    <div class="mt-3 pt-3 border-t border-gray-100 bg-blue-50 rounded-lg p-3">
                        <div class="flex items-start space-x-2">
                            <svg class="w-4 h-4 text-primary-600 mt-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                            </svg>
                            <div class="flex-1">
                                <p class="text-xs text-primary-600 font-medium mb-1">管理员回复</p>
                                <p class="text-sm text-gray-700">${escapeHtml(msg.reply)}</p>
                                ${msg.replied_at ? `<p class="text-xs text-gray-400 mt-1">${formatDateTime(msg.replied_at)}</p>` : ''}
                            </div>
                        </div>
                    </div>
                    ` : ''}
                </div>
                `;
            }).join('');
        }

        // ========== 加载留言 ==========
        async function loadMessages() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-state');
            const emptyEl = document.getElementById('empty-state');
            const listEl = document.getElementById('messages-list');
            const errorMsg = document.getElementById('error-msg');

            loadingEl.classList.remove('hidden');
            errorEl.classList.add('hidden');
            emptyEl.classList.add('hidden');
            listEl.innerHTML = '';

            try {
                const result = await fetchWithTimeout(
                    client.db.from('messages').list()
                        .eq('status', 'visible')
                        .order('created_at', 'desc')
                );
                loadingEl.classList.add('hidden');
                if (result.success) {
                    renderMessages(result.data || []);
                } else {
                    errorEl.classList.remove('hidden');
                    errorMsg.textContent = result.message || '加载失败';
                }
            } catch (error) {
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
                errorMsg.textContent = error.message || '网络错误';
                console.error('加载留言失败:', error);
            }
        }

        function retryLoad() {
            loadMessages();
        }

        // ========== 提交留言 ==========
        const forbiddenNicknames = ['管理员', '官方', 'admin', 'administrator', '管理', '系统', '在野管理员'];

        function isForbiddenNickname(nickname) {
            const lowerNickname = nickname.toLowerCase();
            return forbiddenNicknames.some(name => lowerNickname.includes(name.toLowerCase()));
        }

        async function checkIfAdmin() {
            try {
                const user = await fetchWithTimeout(client.auth.getUser());
                if (user && user.data && (user.data.user_name === 'admin_new' || user.data.user_name === 'admin')) {
                    return true;
                }
            } catch (e) {}
            return false;
        }

        document.getElementById('content').addEventListener('input', function() {
            document.getElementById('char-count').textContent = this.value.length;
        });

        document.getElementById('message-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const originalText = submitBtn.innerHTML;

            let nickname = document.getElementById('nickname').value.trim();
            const content = document.getElementById('content').value.trim();
            const isPrivate = document.getElementById('is-private').checked;

            if (!nickname || !content) {
                showToast('请填写昵称和留言内容', 'warning');
                return;
            }
            if (nickname.length > NICKNAME_MAX) {
                showToast(`昵称不能超过${NICKNAME_MAX}个字`, 'warning');
                return;
            }
            if (content.length > CONTENT_MAX) {
                showToast(`留言内容不能超过${CONTENT_MAX}字`, 'warning');
                return;
            }

            const adminLoggedIn = await checkIfAdmin();
            if (adminLoggedIn) {
                nickname = '管理员';
            } else if (isForbiddenNickname(nickname)) {
                showToast('该昵称包含受限关键词', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>提交中...</span>
            `;

            try {
                const result = await fetchWithTimeout(
                    client.db.from('messages').insert().values({
                        nickname: nickname,
                        content: content,
                        status: 'visible',
                        created_at: new Date().toISOString()
                    })
                );

                if (result.success) {
                    showToast('留言发布成功！');
                    document.getElementById('nickname').value = '';
                    document.getElementById('content').value = '';
                    document.getElementById('is-private').checked = false;
                    document.getElementById('char-count').textContent = '0';
                    await loadMessages();
                } else {
                    showToast('发布失败: ' + (result.message || '未知错误'), 'error');
                }
            } catch (error) {
                showToast('发布失败，请稍后重试', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // ========== 主初始化 ==========
        async function mainInit() {
            try {
                console.log('开始初始化...');
                await initClient();

                // 尝试匿名登录（不等待结果）
                fetchWithTimeout(
                    client.auth.login({ user_name: 'guest', password: 'guest123' })
                ).catch(() => {});

                // 并行加载数据
                await Promise.all([loadAllConfig(), loadAnnouncement(), loadMessages()]);
                console.log('初始化完成');
            } catch (e) {
                console.error('初始化失败:', e);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error-state').classList.remove('hidden');
                document.getElementById('error-msg').textContent = e.message || '初始化失败';
            }
        }

        // DOM 加载完成后启动
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', mainInit);
        } else {
            mainInit();
        }
    </script>
</body>
</html>
